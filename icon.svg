<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d6eaff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)" />

  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />

  <!-- MM monogram -->
  <!-- Left M -->
  <text
    x="50"
    y="63"
    font-family="Montserrat, Georgia, serif"
    font-weight="700"
    font-size="42"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-1"
  >MM</text>

  <!-- Subtle bottom accent line -->
  <line x1="28" y1="72" x2="72" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" />
</svg>
